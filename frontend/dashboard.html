<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h2>Employee Dashboard</h2>

<h3>Add Employee</h3>

<form id="employeeForm">

<input
id="name"
placeholder="Employee Name"
required>

<input
id="email"
placeholder="Employee Email"
required>

<input
id="department"
placeholder="Department"
required>

<input
id="salary"
placeholder="Salary"
required>

<button>
Add Employee
</button>

</form>

<hr>

<h3>Employee List</h3>

<table>

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Department</th>

<th>Salary</th>

<th>Action</th>

</tr>

</thead>

<tbody id="employeeTable">

</tbody>

</table>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
