<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form id="registerForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button>
Register
</button>

</form>

<p>

Already have an account?

<a href="index.html">
Login
</a>

</p>

</div>

<script src="js/register.js"></script>

</body>

</html>
